<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Aulas - Módulo Exclusivo | Aprovação Psycho</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.12.0/dist/cdn.min.js" defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg-dark: #100f1c;
            --bg-card: #1c1b29;
            --primary-purple: #9f54ff;
            --accent-pink: #ff00ff;
            --accent-blue: #00c2ff;
            --border-color: rgba(255, 255, 255, 0.1);
            --header-hover: #2a2938;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: #000000;
            color: #a0a0a0;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(139, 92, 246, 0.6);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .particle:nth-child(2n) {
            background: rgba(236, 72, 153, 0.6);
            animation-duration: 25s;
        }

        .particle:nth-child(3n) {
            background: rgba(6, 182, 212, 0.6);
            animation-duration: 30s;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) translateX(100px) scale(1);
                opacity: 0;
            }
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 8s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientFlow {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* COLLAPSE STYLES */
        .collapse-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .collapse-container:hover {
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(139, 92, 246, 0.2);
        }

        .collapse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: var(--bg-card);
            cursor: pointer;
            border-bottom: 1px solid transparent;
            transition: background 0.2s;
            user-select: none;
        }

        .collapse-header:hover {
            background: var(--header-hover);
        }

        .collapse-container.active .collapse-header {
            border-bottom-color: var(--border-color);
        }

        .lesson-info h3 {
            color: white;
            font-weight: 700;
            font-size: 1.125rem;
            margin-bottom: 0.25rem;
        }

        .lesson-info p {
            color: #888;
            font-size: 0.875rem;
        }

        /* Custom Checkbox */
        .check-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .check-box-custom {
            width: 24px;
            height: 24px;
            border: 2px solid #555;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: transparent;
        }

        .check-container input:checked~.check-box-custom {
            background: #10b981;
            /* Green */
            border-color: #10b981;
            color: white;
        }

        .check-label {
            font-size: 0.75rem;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
        }

        .check-container input:checked~.check-label {
            color: #10b981;
        }

        /* Body Animation */
        .collapse-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.2);
        }

        .collapse-container.active .collapse-body {
            max-height: 2000px;
            /* Arbitrary large max-height */
        }

        .body-content {
            padding: 1.5rem;
        }

        /* Video Placeholders */
        .video-wrapper {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 */
            height: 0;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            color: #555;
        }

        .video-part-title {
            color: var(--primary-purple);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body class="flex flex-col min-h-screen selection:bg-pink-500 selection:text-white" x-data="lessonsApp()">

    <!-- Particles -->
    <div class="particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 1s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 3s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 5s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 2.5s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 4.5s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 1.5s;"></div>
    </div>

    <!-- HEADER -->
    <header class="glass-panel sticky top-0 z-50 border-b-0 relative"
        style="background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="../Imagens_base/logo-principal.png" alt="Logo" class="h-8">
                <img src="https://www.pmpr.pr.gov.br/sites/default/arquivos_restritos/files/imagem/2025-07/img_1121_0.jpg"
                    alt="Brasão"
                    class="h-10 w-10 rounded-full border border-[#9f54ff] object-cover shadow-[0_0_10px_rgba(159,84,255,0.3)]">
                <div class="flex flex-col">
                    <span class="text-xl font-black" style="color:#a0a0a0">APROVAÇÃO <span
                            style="color:#ff00ff;text-shadow:0 0 8px #ff00ff">PSYCHO</span></span>
                    <span class="text-white font-black text-lg leading-none">Polícia Penal - MG <span
                            class="text-[#ff00ff]">2026</span></span>
                    <span class="text-[10px] text-gray-400 font-medium tracking-wider">MÓDULO EXCLUSIVO</span>
                </div>
            </div>
            <a href="index_PPMG_2026.html"
                class="text-sm font-bold text-cyan-400 hover:text-white transition flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">

        <div class="text-center mb-10">
            <h1 class="text-3xl sm:text-4xl font-black text-white mb-2">Aulas <span class="gradient-text">Ao Vivo</span>
            </h1>
            <p class="text-gray-400">Marque as aulas concluídas para acompanhar seu progresso.</p>
        </div>

        <div class="space-y-4">
            <template x-for="(lesson, index) in lessons" :key="index">
                <div class="collapse-container" :class="{ 'active': lesson.isOpen }">

                    <!-- HEADER -->
                    <div class="collapse-header" @click="lesson.isOpen = !lesson.isOpen">
                        <div class="lesson-info">
                            <h3 x-text="lesson.title"></h3>
                            <p x-text="lesson.subtitle"></p>
                        </div>

                        <!-- Checkbox (prevent collapse toggle when clicked) -->
                        <div class="collapse-header-side" @click.stop>
                            <label class="check-container">
                                <span class="check-label" x-text="lesson.studied ? 'Estudado' : 'Estudar'"></span>
                                <input type="checkbox" class="hidden" x-model="lesson.studied" @change="saveProgress()">
                                <div class="check-box-custom">
                                    <i class="fas fa-check"></i>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- BODY -->
                    <div class="collapse-body">
                        <div class="body-content">
                            <!-- TOPICS -->
                            <div class="mb-6">
                                <h4
                                    class="text-xs font-bold text-gray-500 uppercase mb-3 border-b border-gray-800 pb-1">
                                    Tópicos da Aula</h4>
                                <ul class="space-y-2 text-sm text-gray-300">
                                    <template x-for="topic in lesson.topics">
                                        <li class="flex items-start gap-2">
                                            <template x-if="topic.type === 'break'">
                                                <span
                                                    class="w-full text-center text-xs italic text-gray-500 py-1 bg-white/5 rounded my-1 border border-white/5">
                                                    <i class="fas fa-coffee mr-1"></i> Intervalo
                                                </span>
                                            </template>
                                            <template x-if="topic.type !== 'break'">
                                                <div class="flex gap-2">
                                                    <i class="fas fa-check text-[var(--accent-blue)] mt-1 text-xs"></i>
                                                    <span x-text="topic.text"></span>
                                                </div>
                                            </template>
                                        </li>
                                    </template>
                                </ul>
                            </div>

                            <!-- VIDEOS -->
                            <div class="grid md:grid-cols-2 gap-4">
                                <template x-for="(video, vIndex) in lesson.videos">
                                    <div>
                                        <div class="video-part-title" x-text="'Parte ' + (vIndex + 1)"></div>
                                        <div class="video-wrapper">
                                            <!-- Logic: If embed code exists showing iframe, else placeholder -->
                                            <template x-if="video.embed">
                                                <div x-html="video.embed" class="w-full h-full"></div>
                                            </template>
                                            <template x-if="!video.embed">
                                                <div class="video-placeholder">
                                                    <i class="fas fa-lock text-4xl mb-2 opacity-30"></i>
                                                    <span class="text-sm font-bold opacity-50">Disponível em
                                                        Breve</span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>

                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Estado de erro -->
        <div x-show="loadError && !loading" class="text-center py-20">
            <div class="inline-flex flex-col items-center gap-6 bg-white/5 border border-red-500/20 rounded-2xl p-10 max-w-md mx-auto">
                <i class="fas fa-exclamation-circle text-5xl text-red-400"></i>
                <div>
                    <h3 class="text-lg font-bold text-white mb-1">Não foi possível carregar as aulas</h3>
                    <p class="text-sm text-gray-400 mb-1" x-text="loadError"></p>
                    <p class="text-xs text-gray-600">Verifique sua conexão e tente novamente.</p>
                </div>
                <button @click="retry()" class="px-6 py-2 rounded-lg bg-purple-600 hover:bg-purple-500 text-white font-bold text-sm transition flex items-center gap-2">
                    <i class="fas fa-redo"></i> Tentar Novamente
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div x-show="loading" class="text-center py-20 text-gray-500">
            <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
            <p class="text-sm">Carregando aulas...</p>
        </div>

    </main>

    <footer class="border-t border-white/10 mt-auto py-8 bg-[#0f0e1a] text-center text-sm text-gray-600">
        &copy; <span x-data x-text="new Date().getFullYear()">2026</span> Aprovação Psycho. Todos direitos reservados.
    </footer>

    <script>
        function lessonsApp() {
            return {
                lessons: [],
                loading: true,
                loadError: null,

                async fetchWithRetry(url, retries = 2) {
                    for (let i = 0; i < retries; i++) {
                        try {
                            const res = await fetch(url);
                            if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                            return await res.json();
                        } catch (e) {
                            if (i === retries - 1) throw e;
                            await new Promise(r => setTimeout(r, 1500)); // wait 1.5s before retry
                        }
                    }
                },

                async init() {
                    this.loading = true;
                    this.loadError = null;
                    try {
                        const className = window.location.pathname.match(/aulas_(.+)\.html/)?.[1] || 'Base';
                        const url = '../admin/private/aulas_db.json?v=' + new Date().getTime();

                        const data = await this.fetchWithRetry(url);

                        const progressKey = className.toLowerCase() + '_aulas_progress';
                        const savedProgress = JSON.parse(localStorage.getItem(progressKey) || '{}');

                        let lessonsList = [];
                        if (Array.isArray(data)) {
                            lessonsList = data;
                        } else {
                            lessonsList = data[className] || [];
                        }

                        this.lessons = lessonsList.map(l => ({
                            ...l,
                            studied: savedProgress[l.id] || false,
                            isOpen: l.isOpen
                        }));
                    } catch (e) {
                        console.error('Erro ao carregar aulas:', e);
                        if (window.location.protocol === 'file:') {
                            this.loadError = 'Para rodar localmente sem dar erro de "Failed to fetch" (CORS), utilize o script "run_local.bat" presente na raiz do seu projeto ou a extensao Live Server do VSCode.';
                        } else {
                            this.loadError = e.message || 'Falha de conexão. Verifique sua internet e tente novamente.';
                        }
                    } finally {
                        this.loading = false;
                    }
                },

                async retry() {
                    await this.init();
                },

                saveProgress() {
                    // Extract class name from filename for the key
                    const className = window.location.pathname.match(/aulas_(.+)\.html/)?.[1] || 'Base';
                    const progressKey = className.toLowerCase() + '_aulas_progress';

                    const progressMap = {};
                    this.lessons.forEach(l => {
                        if (l.studied) progressMap[l.id] = true;
                    });
                    localStorage.setItem(progressKey, JSON.stringify(progressMap));
                }
            }
        }
    </script>
</body>

</html>
