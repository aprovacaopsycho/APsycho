<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Aulas - Módulo Exclusivo | Aprovação Psycho</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.12.0/dist/cdn.min.js" defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg-dark: #100f1c;
            --bg-card: #1c1b29;
            --primary-purple: #9f54ff;
            --accent-pink: #ff00ff;
            --accent-blue: #00c2ff;
            --border-color: rgba(255, 255, 255, 0.1);
            --header-hover: #2a2938;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: #000000;
            color: #a0a0a0;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(139, 92, 246, 0.6);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .particle:nth-child(2n) {
            background: rgba(236, 72, 153, 0.6);
            animation-duration: 25s;
        }

        .particle:nth-child(3n) {
            background: rgba(6, 182, 212, 0.6);
            animation-duration: 30s;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) translateX(100px) scale(1);
                opacity: 0;
            }
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 8s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientFlow {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* COLLAPSE STYLES */
        .collapse-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .collapse-container:hover {
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(139, 92, 246, 0.2);
        }

        .collapse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: var(--bg-card);
            cursor: pointer;
            border-bottom: 1px solid transparent;
            transition: background 0.2s;
            user-select: none;
        }

        .collapse-header:hover {
            background: var(--header-hover);
        }

        .collapse-container.active .collapse-header {
            border-bottom-color: var(--border-color);
        }

        .lesson-info h3 {
            color: white;
            font-weight: 700;
            font-size: 1.125rem;
            margin-bottom: 0.25rem;
        }

        .lesson-info p {
            color: #888;
            font-size: 0.875rem;
        }

        /* Custom Checkbox */
        .check-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .check-box-custom {
            width: 24px;
            height: 24px;
            border: 2px solid #555;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: transparent;
        }

        .check-container input:checked~.check-box-custom {
            background: #10b981;
            /* Green */
            border-color: #10b981;
            color: white;
        }

        .check-label {
            font-size: 0.75rem;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
        }

        .check-container input:checked~.check-label {
            color: #10b981;
        }

        /* Body Animation */
        .collapse-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.2);
        }

        .collapse-container.active .collapse-body {
            max-height: 2000px;
            /* Arbitrary large max-height */
        }

        .body-content {
            padding: 1.5rem;
        }

        /* Video Placeholders */
        .video-wrapper {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 */
            height: 0;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            color: #555;
        }

        .video-part-title {
            color: var(--primary-purple);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body class="flex flex-col min-h-screen selection:bg-pink-500 selection:text-white" x-data="lessonsApp()">

    <!-- Particles -->
    <div class="particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 1s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 3s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 5s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 2.5s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 4.5s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 1.5s;"></div>
    </div>

    <!-- HEADER -->
    <header class="glass-panel sticky top-0 z-50 border-b-0 relative"
        style="background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="../Imagens_base/logo-principal.png" alt="Logo" class="h-8">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Bras%C3%A3o_da_Pol%C3%ADcia_Militar_do_Cear%C3%A1.png/150px-Bras%C3%A3o_da_Pol%C3%ADcia_Militar_do_Cear%C3%A1.png"
                    alt="Brasão PM-CE"
                    class="h-10 w-10 rounded-full border border-[#9f54ff] object-cover shadow-[0_0_10px_rgba(159,84,255,0.3)] bg-white p-1">
                <div class="flex flex-col">
                    <span class="text-xl font-black" style="color:#a0a0a0">APROVAÇÃO <span
                            style="color:#ff00ff;text-shadow:0 0 8px #ff00ff">PSYCHO</span></span>
                    <span class="text-white font-black text-lg leading-none">PM-CE <span
                            class="text-[#ff00ff]">2026</span></span>
                    <span class="text-[10px] text-gray-400 font-medium tracking-wider">MÓDULO EXCLUSIVO</span>
                </div>
            </div>
            <a href="index_PMCE_2026.html"
                class="text-sm font-bold text-cyan-400 hover:text-white transition flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">

        <div class="text-center mb-10">
            <h1 class="text-3xl sm:text-4xl font-black text-white mb-2">Aulas <span class="gradient-text">Ao Vivo</span>
            </h1>
            <p class="text-gray-400">Marque as aulas concluídas para acompanhar seu progresso.</p>
        </div>

        <div class="space-y-4">
            <template x-for="(lesson, index) in lessons" :key="lesson.id || index">
                <div class="collapse-container" :class="{ 'active': lesson.isOpen }">

                    <!-- HEADER -->
                    <div class="collapse-header" @click="lesson.isOpen = !lesson.isOpen">
                        <div class="lesson-info">
                            <h3 x-text="lesson.title"></h3>
                            <p x-text="lesson.subtitle"></p>
                        </div>

                        <!-- Checkbox (prevent collapse toggle when clicked) -->
                        <div class="collapse-header-side" @click.stop>
                            <label class="check-container">
                                <span class="check-label" x-text="lesson.studied ? 'Estudado' : 'Estudar'"></span>
                                <input type="checkbox" class="hidden" x-model="lesson.studied" @change="saveProgress()">
                                <div class="check-box-custom">
                                    <i class="fas fa-check"></i>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- BODY -->
                    <div class="collapse-body">
                        <div class="body-content">
                            <!-- TOPICS -->
                            <div class="mb-6" x-show="lesson.topics && lesson.topics.length > 0">
                                <h4
                                    class="text-xs font-bold text-gray-500 uppercase mb-3 border-b border-gray-800 pb-1">
                                    Tópicos da Aula</h4>
                                <ul class="space-y-2 text-sm text-gray-300">
                                    <template x-for="(topic, tIndex) in lesson.topics" :key="tIndex">
                                        <li class="flex items-start gap-2">
                                            <template x-if="topic.type === 'break'">
                                                <span
                                                    class="w-full text-center text-xs italic text-gray-500 py-1 bg-white/5 rounded my-1 border border-white/5">
                                                    <i class="fas fa-coffee mr-1"></i> Intervalo
                                                </span>
                                            </template>
                                            <template x-if="topic.type !== 'break'">
                                                <div class="flex gap-2">
                                                    <i class="fas fa-check text-[var(--accent-blue)] mt-1 text-xs"></i>
                                                    <span x-text="topic.text"></span>
                                                </div>
                                            </template>
                                        </li>
                                    </template>
                                </ul>
                            </div>

                            <!-- LINKS -->
                            <div class="mb-6" x-show="lesson.links && lesson.links.length > 0">
                                <h4 class="text-xs font-bold text-gray-500 uppercase mb-3 border-b border-gray-800 pb-1">
                                    Links e Materiais</h4>
                                <ul class="space-y-2">
                                    <template x-for="(link, lIndex) in lesson.links" :key="lIndex">
                                        <li>
                                            <a :href="link.url" target="_blank" rel="noopener"
                                                class="flex items-center gap-2 text-sm text-cyan-400 hover:text-cyan-300 hover:underline transition group">
                                                <i class="fas fa-external-link-alt text-xs opacity-50 group-hover:opacity-100"></i>
                                                <span x-text="link.label || link.url"></span>
                                            </a>
                                        </li>
                                    </template>
                                </ul>
                            </div>

                            <!-- VIDEOS -->
                            <div class="grid md:grid-cols-2 gap-4" x-show="lesson.videos && lesson.videos.length > 0">
                                <template x-for="(video, vIndex) in lesson.videos" :key="vIndex">
                                    <div>
                                        <div class="video-part-title" x-text="'Parte ' + (vIndex + 1)"></div>
                                        <div class="video-wrapper">
                                            <template x-if="video.embed">
                                                <div x-html="video.embed" class="w-full h-full"></div>
                                            </template>
                                            <template x-if="!video.embed">
                                                <div class="video-placeholder">
                                                    <i class="fas fa-lock text-4xl mb-2 opacity-30"></i>
                                                    <span class="text-sm font-bold opacity-50">Disponível em
                                                        Breve</span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>

                        </div>
                    </div>
                </div>
            </template>
            
            
            <div x-show="lessons.length === 0" class="text-center py-20 text-gray-500">
                <i class="fas fa-book-open text-4xl mb-4 opacity-50"></i>
                <p>Nenhuma aula disponivel ainda.</p>
            </div>

    </main>

    <footer class="border-t border-white/10 mt-auto py-8 bg-[#0f0e1a] text-center text-sm text-gray-600">
        &copy; <span x-data x-text="new Date().getFullYear()">2026</span> Aprovação Psycho. Todos direitos reservados.
    </footer>

    <script>
        function lessonsApp() {
            const DATA = [
    {
        id: "pmce_aula_01",
        title: "Aula 01 - Edital e Personalidade",
        subtitle: "An\u00e1lise do Edital, Base Te\u00f3rica e BFP",
        isOpen: true,
        topics: [
            { type: "topic", text: "An\u00e1lise do Edital PM-CE 2026" },
            { type: "topic", text: "Base te\u00f3rica para os testes de Personalidade" },
            { type: "topic", text: "Teste BFP (favorito UECE)" }
        ],
        links: [
            { label: "Simulador BFP", url: "bfp_PMCE.html" },
            { label: "Apostila - Personalidade", url: "apostila/apostila_personalidade.html" }
        ],
        videos: [
            { embed: "" },
            { embed: "" }
        ]
    },
    {
        id: "pmce_aula_02",
        title: "Aula 02 - Personalidade e Aten\u00e7\u00e3o",
        subtitle: "IFP-II, NEO, EATA e Palogr\u00e1fico",
        isOpen: false,
        topics: [
            { type: "topic", text: "IFP-II: Invent\u00e1rio Fatorial de Personalidade" },
            { type: "topic", text: "NEO: Big Five e perfil esperado PM-CE" },
            { type: "topic", text: "EATA: Estrat\u00e9gia de resposta r\u00e1pida" },
            { type: "break", text: "" },
            { type: "topic", text: "PALOGR\u00c1FICO (favorito UECE)" }
        ],
        links: [
            { label: "Simulador IFP-II", url: "ifp2_pmce.html" },
            { label: "Simulador NEO", url: "neopi.html" },
            { label: "Simulador EATA", url: "eata.html" },
            { label: "Simulador Palogr\u00e1fico", url: "palografico.html" },
            { label: "Apostila - Personalidade", url: "apostila/apostila_personalidade.html" }
        ],
        videos: [
            { embed: "" },
            { embed: "" }
        ]
    },
    {
        id: "pmce_aula_03",
        title: "Aula 03 - Aten\u00e7\u00e3o e Mem\u00f3ria",
        subtitle: "CTA, ROTA, TEACO, TEADI, AC-Vetor, TEPIC, MEM\u00d3RIA F e TSP",
        isOpen: false,
        topics: [
            { type: "topic", text: "CTA: Concentra\u00e7\u00e3o e Aten\u00e7\u00e3o" },
            { type: "topic", text: "ROTA (favorito UECE)" },
            { type: "topic", text: "TEACO-FF: Aten\u00e7\u00e3o Concentrada" },
            { type: "topic", text: "TEADI: Aten\u00e7\u00e3o Dividida" },
            { type: "topic", text: "AC-Vetor: Aten\u00e7\u00e3o Concentrada Visual" },
            { type: "break", text: "" },
            { type: "topic", text: "TEPIC: Mem\u00f3ria Epis\u00f3dica" },
            { type: "topic", text: "MEM\u00d3RIA F (favorito UECE)" },
            { type: "topic", text: "TSP Mem\u00f3ria" }
        ],
        links: [
            { label: "Simulador CTA", url: "cta/ctaac.html" },
            { label: "Simulador ROTA", url: "rotas/rotaa.html" },
            { label: "Simulador TEACO", url: "teaco/teaco.html" },
            { label: "Simulador TEADI", url: "teadi/teadi.html" },
            { label: "Simulador AC-Vetor", url: "acvetor.html" },
            { label: "Simulador TEPIC", url: "tepic/tepic.html" },
            { label: "Simulador MEM\u00d3RIA F", url: "memof/memof.html" },
            { label: "Simulador TSP Mem\u00f3ria", url: "tspmemo/tspmemo.html" },
            { label: "Apostila - Aten\u00e7\u00e3o", url: "apostila/apostila_atencao.html" },
            { label: "Apostila - Mem\u00f3ria", url: "apostila/apostila_memoria.html" }
        ],
        videos: [
            { embed: "" },
            { embed: "" }
        ]
    },
    {
        id: "pmce_aula_04",
        title: "Aula 04 - Intelig\u00eancia",
        subtitle: "BETA III Matricial, MIG, G36 e TRI",
        isOpen: false,
        topics: [
            { type: "topic", text: "BETA III Matricial" },
            { type: "topic", text: "MIG (favorito UECE)" },
            { type: "break", text: "" },
            { type: "topic", text: "G36 (favorito UECE)" },
            { type: "topic", text: "TRI: Teste R\u00e1pido de Intelig\u00eancia" }
        ],
        links: [
            { label: "Simulador BETA III", url: "beta3m.html" },
            { label: "Simulador MIG", url: "mig.html" },
            { label: "Simulador G36", url: "g36.html" },
            { label: "Simulador TRI", url: "tri.html" },
            { label: "Apostila - Intelig\u00eancia", url: "apostila/apostila_inteligencia.html" }
        ],
        videos: [
            { embed: "" },
            { embed: "" }
        ]
    }
];

            return {
                lessons: [],
                loading: false,
                loadError: null,

                init() {
                    const m = window.location.pathname.match(/aulas_(.+)\.html/);
                    const className = m ? m[1] : 'PMCE';
                    const progressKey = className.toLowerCase() + '_aulas_progress';
                    const savedProgress = JSON.parse(localStorage.getItem(progressKey) || '{}');

                    this.lessons = DATA.map(l => ({
                        ...l,
                        studied: savedProgress[l.id] || false,
                        isOpen: l.isOpen || false
                    }));
                },

                saveProgress() {
                    const m = window.location.pathname.match(/aulas_(.+)\.html/);
                    const className = m ? m[1] : 'PMCE';
                    const progressKey = className.toLowerCase() + '_aulas_progress';

                    const progressMap = {};
                    this.lessons.forEach(l => {
                        if (l.studied) progressMap[l.id] = true;
                    });
                    localStorage.setItem(progressKey, JSON.stringify(progressMap));
                }
            }
        }
    </script>
</body>

</html>
