<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Aulas | Aprovacao Psycho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.12.0/dist/cdn.min.js" defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f0e1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; }
        input, select, textarea { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 4px; padding: 8px 12px; width: 100%; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #9f54ff; }
        .btn { padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: #9f54ff; color: white; }
        .btn-primary:hover { background: #8b3dff; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        .btn-danger { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.3); }
        .btn-green { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .btn-green:hover { background: rgba(16,185,129,0.3); }
        .field-hint { font-size: 0.7rem; color: #666; margin-top: 2px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen flex flex-col" x-data="editorApp()">

    <!-- TOP BAR -->
    <header class="border-b border-white/10 bg-black/50 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-3">
            <h1 class="text-xl font-black tracking-tight flex items-center gap-2">
                <i class="fas fa-edit text-purple-500"></i> EDITOR DE AULAS
            </h1>
            <div class="flex items-center gap-3 flex-wrap">
                <template x-if="fileName">
                    <span class="text-sm text-green-400 font-mono px-3 py-1 rounded bg-green-400/10" x-text="fileName"></span>
                </template>
                <button class="btn btn-green" @click="openFromUrl()" title="Abrir URL de arquivo local">
                    <i class="fas fa-link"></i> Abrir por URL
                </button>
                <label class="btn btn-secondary cursor-pointer">
                    <i class="fas fa-folder-open"></i> Carregar HTML
                    <input type="file" accept=".html" class="hidden" @change="handleFileLoad">
                </label>
                <button class="btn btn-primary" @click="saveAndDownload()" :disabled="!isLoaded">
                    <i class="fas fa-download"></i> Baixar Atualizado
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN EDITOR -->
    <main class="flex-grow container mx-auto p-4 flex gap-6 mt-4" x-show="isLoaded" style="display: none;">

        <!-- SIDEBAR -->
        <div class="w-1/4 min-w-[200px] panel p-4 flex flex-col h-[calc(100vh-105px)] overflow-hidden">
            <div class="flex justify-between items-center mb-3 border-b border-white/10 pb-2">
                <h2 class="font-bold text-gray-300 text-sm">AULAS (<span x-text="lessons.length"></span>)</h2>
                <button class="btn btn-primary py-1 px-3 text-xs" @click="addLesson()">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div class="flex-grow overflow-y-auto space-y-1 pr-1">
                <template x-for="(lesson, index) in lessons" :key="lesson.id || index">
                    <div class="p-3 border rounded-lg cursor-pointer transition flex justify-between items-center group"
                         :class="selectedIndex === index ? 'bg-purple-900/40 border-purple-500' : 'border-white/5 hover:border-white/20'"
                         @click="selectedIndex = index">
                        <div class="truncate pr-2 min-w-0">
                            <div class="text-sm font-bold text-white truncate" x-text="lesson.title || 'Nova Aula'"></div>
                            <div class="text-xs text-gray-500 truncate" x-text="lesson.subtitle || '--'"></div>
                            <div class="flex gap-2 mt-1">
                                <span class="text-[10px] text-gray-600" x-text="(lesson.topics||[]).length + ' top.'"></span>
                                <span class="text-[10px] text-gray-600" x-text="(lesson.links||[]).length + ' links'"></span>
                                <span class="text-[10px] text-gray-600" x-text="(lesson.videos||[]).length + ' vids'"></span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition shrink-0">
                            <button @click.stop="moveLesson(index, -1)" :disabled="index === 0"
                                class="text-gray-400 hover:text-white disabled:opacity-20 text-xs p-1">
                                <i class="fas fa-chevron-up"></i>
                            </button>
                            <button @click.stop="moveLesson(index, 1)" :disabled="index === lessons.length - 1"
                                class="text-gray-400 hover:text-white disabled:opacity-20 text-xs p-1">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </div>
                    </div>
                </template>
                <div x-show="lessons.length === 0" class="text-center text-sm text-gray-500 mt-10">
                    Nenhuma aula. Clique + para criar.
                </div>
            </div>
        </div>

        <!-- LESSON EDITOR -->
        <div class="w-3/4 panel p-6 h-[calc(100vh-105px)] overflow-y-auto">
            <template x-if="selectedIndex !== null && lessons[selectedIndex]">
                <div>
                    <div class="flex justify-between items-start mb-5 border-b border-white/10 pb-3">
                        <div>
                            <h2 class="text-lg font-bold text-white">Editando Aula <span class="text-purple-400" x-text="selectedIndex + 1"></span></h2>
                            <p class="text-xs text-gray-500 font-mono mt-1" x-text="'ID: ' + (lessons[selectedIndex].id || '(vazio)')"></p>
                        </div>
                        <button class="btn btn-danger py-1 px-3 text-xs" @click="removeLesson(selectedIndex)">
                            <i class="fas fa-trash"></i> Excluir
                        </button>
                    </div>

                    <!-- INFO -->
                    <div class="mb-6 p-4 bg-white/[0.02] rounded-lg border border-white/5">
                        <h3 class="text-xs font-bold text-gray-500 uppercase mb-3"><i class="fas fa-info-circle text-purple-400 mr-1"></i> Informacoes Basicas</h3>
                        <div class="grid grid-cols-2 gap-4 mb-3">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 mb-1">ID da Aula (unico)</label>
                                <input type="text" x-model="lessons[selectedIndex].id" placeholder="ex: pmce_aula_01">
                                <span class="field-hint">Usado para salvar progresso no localStorage</span>
                            </div>
                            <div class="flex items-end pb-2">
                                <label class="flex items-center gap-2 cursor-pointer text-sm">
                                    <input type="checkbox" x-model="lessons[selectedIndex].isOpen" class="w-5 h-5 accent-purple-500 rounded">
                                    <span class="text-gray-300">Expandido por padrao</span>
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="block text-xs font-bold text-gray-400 mb-1">Titulo</label>
                            <input type="text" x-model="lessons[selectedIndex].title" placeholder="ex: Aula 01 - Introducao">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Subtitulo</label>
                            <input type="text" x-model="lessons[selectedIndex].subtitle" placeholder="ex: Conceitos Fundamentais">
                        </div>
                    </div>

                    <!-- TOPICS -->
                    <div class="mb-6 p-4 bg-black/20 rounded-lg border border-white/5">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-xs font-bold text-gray-500 uppercase"><i class="fas fa-list-ul text-blue-400 mr-1"></i> Topicos da Aula</h3>
                            <button class="btn btn-secondary py-1 px-3 text-xs" @click="addTopic()">
                                <i class="fas fa-plus"></i> Topico
                            </button>
                        </div>
                        <div class="space-y-2">
                            <template x-for="(topic, tIndex) in lessons[selectedIndex].topics" :key="tIndex">
                                <div class="flex gap-2 items-center group">
                                    <select x-model="topic.type" class="text-xs" style="width: 130px; min-width: 130px;">
                                        <option value="topic">Topico Normal</option>
                                        <option value="break">Intervalo</option>
                                    </select>
                                    <input type="text" x-model="topic.text" class="flex-grow text-sm"
                                           :placeholder="topic.type === 'break' ? 'Ex: 15 min - Intervalo' : 'Descreva o topico...'">
                                    <button class="btn btn-danger py-2 px-2 text-xs opacity-0 group-hover:opacity-100"
                                            @click="removeTopic(tIndex)" title="Remover">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </template>
                            <div x-show="!lessons[selectedIndex].topics || lessons[selectedIndex].topics.length === 0"
                                 class="text-sm text-gray-500 italic text-center py-4">
                                Nenhum topico. Clique em + Topico para adicionar.
                            </div>
                        </div>
                    </div>

                    <!-- LINKS -->
                    <div class="mb-6 p-4 bg-black/20 rounded-lg border border-white/5">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-xs font-bold text-gray-500 uppercase"><i class="fas fa-link text-cyan-400 mr-1"></i> Links e Materiais</h3>
                            <button class="btn btn-secondary py-1 px-3 text-xs" @click="addLink()">
                                <i class="fas fa-plus"></i> Link
                            </button>
                        </div>
                        <div class="space-y-2">
                            <template x-for="(link, lIndex) in lessons[selectedIndex].links" :key="lIndex">
                                <div class="flex gap-3 items-center border border-white/5 rounded p-3 bg-black/30 group">
                                    <div class="flex-grow grid grid-cols-2 gap-3">
                                        <div>
                                            <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Rotulo (texto exibido)</label>
                                            <input type="text" x-model="link.label" class="text-sm" placeholder="Ex: Simulado TEACO-FF (PDF)">
                                        </div>
                                        <div>
                                            <label class="block text-[10px] font-bold text-gray-500 mb-0.5">URL do Link</label>
                                            <input type="text" x-model="link.url" class="text-sm" placeholder="Ex: https://... ou #">
                                        </div>
                                    </div>
                                    <button class="btn btn-danger py-2 px-2 text-xs opacity-0 group-hover:opacity-100 shrink-0"
                                            @click="removeLink(lIndex)" title="Remover Link">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </template>
                            <div x-show="!lessons[selectedIndex].links || lessons[selectedIndex].links.length === 0"
                                 class="text-sm text-gray-500 italic text-center py-4">
                                Nenhum link. Clique em + Link para adicionar.
                            </div>
                        </div>
                    </div>

                    <!-- VIDEOS -->
                    <div class="mb-6 p-4 bg-black/20 rounded-lg border border-white/5">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-xs font-bold text-gray-500 uppercase"><i class="fas fa-video text-pink-400 mr-1"></i> Blocos de Video</h3>
                            <button class="btn btn-secondary py-1 px-3 text-xs" @click="addVideo()">
                                <i class="fas fa-plus"></i> Video
                            </button>
                        </div>
                        <div class="space-y-4">
                            <template x-for="(video, vIndex) in lessons[selectedIndex].videos" :key="vIndex">
                                <div class="border border-white/10 p-4 rounded bg-black/40 group">
                                    <div class="flex justify-between items-center mb-3">
                                        <span class="text-xs font-bold text-purple-400">PARTE <span x-text="vIndex + 1"></span></span>
                                        <span class="text-[10px] text-gray-600" x-text="video.embed ? 'com embed' : 'sem embed'"></span>
                                    </div>
                                    <textarea x-model="video.embed" rows="3" class="text-xs font-mono"
                                        placeholder='Cole o codigo iframe aqui. Deixe vazio para "Disponivel em Breve".'></textarea>
                                    <button class="btn btn-danger py-1 px-2 text-xs mt-2 opacity-0 group-hover:opacity-100"
                                            @click="removeVideo(vIndex)">
                                        <i class="fas fa-trash"></i> Remover
                                    </button>
                                </div>
                            </template>
                            <div x-show="!lessons[selectedIndex].videos || lessons[selectedIndex].videos.length === 0"
                                 class="text-sm text-gray-500 italic text-center py-4">
                                Nenhum video. Clique em + Video para adicionar.
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <template x-if="selectedIndex === null || !lessons[selectedIndex]">
                <div class="h-full flex flex-col items-center justify-center text-gray-500 gap-4">
                    <i class="fas fa-hand-pointer text-5xl opacity-30"></i>
                    <p>Selecione uma aula na lista (lado esquerdo) para editar<br>ou clique em + para criar uma nova.</p>
                </div>
            </template>
        </div>
    </main>

    <!-- WELCOME -->
    <div class="flex-grow flex items-center justify-center" x-show="!isLoaded">
        <div class="text-center panel p-12 max-w-lg mx-4">
            <i class="fas fa-code text-7xl text-purple-500 mb-6"></i>
            <h2 class="text-2xl font-bold text-white mb-2">Editor de Aulas</h2>
            <p class="text-gray-400 mb-2">Edite qualquer arquivo HTML de aulas que use o sistema de dados inline.</p>
            <p class="text-gray-600 text-sm mb-8">O JSON esta embutido na tag <code class="bg-white/10 px-2 py-0.5 rounded text-purple-300">&lt;script id="aulas-data"&gt;</code> sem dependencias externas.</p>
            <div class="flex flex-col gap-3">
                <label class="btn btn-primary text-lg px-8 py-3 cursor-pointer shadow-lg shadow-purple-500/20">
                    <i class="fas fa-file-import"></i> Carregar Arquivo HTML
                    <input type="file" accept=".html" class="hidden" @change="handleFileLoad">
                </label>
                <button class="btn btn-secondary" @click="quickStart()">
                    <i class="fas fa-magic"></i> Comecar Vazio (nova pagina)
                </button>
            </div>
        </div>
    </div>

    <!-- TOASTS -->
    <div class="fixed bottom-4 right-4 bg-red-900 border border-red-500 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transition-all duration-300 z-50"
         x-show="errorMsg" style="display: none;">
        <i class="fas fa-exclamation-triangle shrink-0"></i>
        <span x-text="errorMsg" class="text-sm"></span>
        <button @click="errorMsg = ''" class="ml-2 text-red-300 hover:text-white shrink-0"><i class="fas fa-times"></i></button>
    </div>
    <div class="fixed bottom-4 right-4 bg-green-900 border border-green-500 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transition-all duration-300 z-50"
         x-show="successMsg" style="display: none;">
        <i class="fas fa-check-circle shrink-0"></i>
        <span x-text="successMsg" class="text-sm"></span>
        <button @click="successMsg = ''" class="ml-2 text-green-300 hover:text-white shrink-0"><i class="fas fa-times"></i></button>
    </div>

    <script>
        function editorApp() {
            var END = String.fromCharCode(60) + '/script' + String.fromCharCode(62);
            var JSON_MARKER = '<script id="aulas-data" type="application/json">';

            return {
                htmlContent: '',
                fileName: '',
                isLoaded: false,
                lessons: [],
                selectedIndex: null,
                errorMsg: '',
                successMsg: '',

                handleFileLoad: function(event) {
                    var self = this;
                    var file = event.target.files[0];
                    if (!file) return;
                    this.fileName = file.name;
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        self.htmlContent = e.target.result;
                        self.extractJson();
                    };
                    reader.onerror = function() {
                        self.showError('Erro ao ler o arquivo.');
                    };
                    reader.readAsText(file);
                },

                quickStart: function() {
                    this.fileName = 'aulas_novo.html';
                    this.htmlContent = TEMPLATE_AULAS.replace('{JSON}', '[]');
                    this.lessons = [];
                    this.isLoaded = true;
                    this.selectedIndex = null;
                    this.showSuccess('Pagina em branco criada. Adicione aulas pelo botao +');
                },

                openFromUrl: function() {
                    var self = this;
                    var url = prompt('Cole o caminho ou URL do arquivo HTML de aulas:', '');
                    if (!url) return;
                    fetch(url).then(function(res) {
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        return res.text();
                    }).then(function(text) {
                        self.htmlContent = text;
                        self.fileName = url.split('/').pop() || 'aulas.html';
                        self.extractJson();
                    }).catch(function(e) {
                        self.showError('Erro ao carregar URL: ' + e.message);
                    });
                },

                extractJson: function() {
                    try {
                        var startIndex = this.htmlContent.indexOf(JSON_MARKER);
                        if (startIndex === -1) {
                            throw new Error('Tag JSON nao encontrada. O arquivo usa dados inline?');
                        }
                        var dataStart = startIndex + JSON_MARKER.length;
                        var endIndex = this.htmlContent.indexOf(END, dataStart);
                        if (endIndex === -1) throw new Error('Tag de fechamento nao encontrada.');
                        var jsonStr = this.htmlContent.substring(dataStart, endIndex).trim();
                        this.lessons = jsonStr ? JSON.parse(jsonStr) : [];
                        this.isLoaded = true;
                        this.selectedIndex = this.lessons.length > 0 ? 0 : null;
                        this.errorMsg = '';
                        this.showSuccess(this.lessons.length + ' aula(s) carregada(s) de "' + this.fileName + '"');
                    } catch(e) {
                        console.error(e);
                        this.showError(e.message || 'Falha ao analisar JSON.');
                        this.isLoaded = false;
                        this.lessons = [];
                        this.selectedIndex = null;
                    }
                },

                addLesson: function() {
                    this.lessons.push({
                        id: 'aula_' + Date.now(),
                        title: 'Nova Aula',
                        subtitle: '',
                        isOpen: false,
                        topics: [],
                        links: [],
                        videos: [{ embed: '' }]
                    });
                    this.selectedIndex = this.lessons.length - 1;
                },

                removeLesson: function(index) {
                    if (!confirm('Excluir permanentemente "' + (this.lessons[index].title || 'Aula sem titulo') + '"?')) return;
                    this.lessons.splice(index, 1);
                    this.selectedIndex = this.lessons.length > 0 ? Math.min(index, this.lessons.length - 1) : null;
                },

                moveLesson: function(index, dir) {
                    var newIndex = index + dir;
                    if (newIndex >= 0 && newIndex < this.lessons.length) {
                        var temp = this.lessons[index];
                        this.lessons[index] = this.lessons[newIndex];
                        this.lessons[newIndex] = temp;
                        this.selectedIndex = newIndex;
                    }
                },

                addTopic: function() {
                    var lesson = this.lessons[this.selectedIndex];
                    if (!lesson.topics) lesson.topics = [];
                    lesson.topics.push({ type: 'topic', text: '' });
                },
                removeTopic: function(tIndex) {
                    this.lessons[this.selectedIndex].topics.splice(tIndex, 1);
                },

                addLink: function() {
                    var lesson = this.lessons[this.selectedIndex];
                    if (!lesson.links) lesson.links = [];
                    lesson.links.push({ label: '', url: '' });
                },
                removeLink: function(lIndex) {
                    this.lessons[this.selectedIndex].links.splice(lIndex, 1);
                },

                addVideo: function() {
                    var lesson = this.lessons[this.selectedIndex];
                    if (!lesson.videos) lesson.videos = [];
                    lesson.videos.push({ embed: '' });
                },
                removeVideo: function(vIndex) {
                    this.lessons[this.selectedIndex].videos.splice(vIndex, 1);
                },

                saveAndDownload: function() {
                    try {
                        var newHtml;
                        if (this.htmlContent && this.htmlContent.indexOf(JSON_MARKER) !== -1) {
                            var parts = this.htmlContent.split(JSON_MARKER);
                            var bottomParts = parts[1].split(END);
                            var newJson = JSON.stringify(this.lessons, null, 4);
                            newHtml = parts[0] + JSON_MARKER + '\n' + newJson + '\n    ' + END + bottomParts.slice(1).join(END);
                        } else {
                            newHtml = TEMPLATE_AULAS.replace('{JSON}', JSON.stringify(this.lessons, null, 4));
                        }
                        var blob = new Blob([newHtml], { type: 'text/html' });
                        var url = URL.createObjectURL(blob);
                        var a = document.createElement('a');
                        a.href = url;
                        a.download = this.fileName || 'aulas_atualizado.html';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        this.htmlContent = newHtml;
                        this.showSuccess('Arquivo "' + this.fileName + '" baixado com ' + this.lessons.length + ' aula(s)!');
                    } catch(e) {
                        console.error(e);
                        this.showError('Erro ao gerar o arquivo.');
                    }
                },

                showError: function(msg) {
                    this.errorMsg = msg;
                    this.successMsg = '';
                    var self = this;
                    setTimeout(function() { if (self.errorMsg === msg) self.errorMsg = ''; }, 6000);
                },
                showSuccess: function(msg) {
                    this.successMsg = msg;
                    this.errorMsg = '';
                    var self = this;
                    setTimeout(function() { if (self.successMsg === msg) self.successMsg = ''; }, 4000);
                }
            };
        }
    </script>

    <!-- HIDDEN TEMPLATE (no parser-conflicting tags) -->
    <template id="tpl-aulas"><!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Aulas | Aprovacao Psycho</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.12.0/dist/cdn.min.js" defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root { --bg-dark: #100f1c; --bg-card: #1c1b29; --primary-purple: #9f54ff; --accent-pink: #ff00ff; --accent-blue: #00c2ff; --border-color: rgba(255,255,255,0.1); --header-hover: #2a2938; }
        body { font-family: 'Outfit','Inter',sans-serif; background: #000; color: #a0a0a0; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at 20% 50%, rgba(139,92,246,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(236,72,153,0.15) 0%, transparent 50%), radial-gradient(circle at 40% 20%, rgba(6,182,212,0.1) 0%, transparent 50%); animation: gradientShift 15s ease infinite; z-index:0; }
        @keyframes gradientShift { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.8; transform:scale(1.1); } }
        .particles { position:fixed; top:0; left:0; width:100%; height:100%; overflow:hidden; z-index:1; pointer-events:none; }
        .particle { position:absolute; width:3px; height:3px; background:rgba(139,92,246,0.6); border-radius:50%; animation:float 20s infinite; }
        .particle:nth-child(2n) { background:rgba(236,72,153,0.6); animation-duration:25s; }
        .particle:nth-child(3n) { background:rgba(6,182,212,0.6); animation-duration:30s; }
        @keyframes float { 0% { transform:translateY(100vh) translateX(0) scale(0); opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { transform:translateY(-100vh) translateX(100px) scale(1); opacity:0; } }
        .gradient-text { background:linear-gradient(135deg, #ffffff 0%, #8b5cf6 50%, #ec4899 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:gradientFlow 8s ease infinite; background-size:200% 200%; }
        @keyframes gradientFlow { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
        .collapse-container { background:linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%); backdrop-filter:blur(16px); border:1px solid var(--border-color); border-radius:12px; margin-bottom:1rem; overflow:hidden; transition:all 0.3s ease; box-shadow:0 8px 32px 0 rgba(0,0,0,0.4); }
        .collapse-container:hover { border-color:rgba(139,92,246,0.3); box-shadow:0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(139,92,246,0.2); }
        .collapse-header { display:flex; justify-content:space-between; align-items:center; padding:1.5rem; background:var(--bg-card); cursor:pointer; border-bottom:1px solid transparent; transition:background 0.2s; user-select:none; }
        .collapse-header:hover { background:var(--header-hover); }
        .collapse-container.active .collapse-header { border-bottom-color:var(--border-color); }
        .lesson-info h3 { color:white; font-weight:700; font-size:1.125rem; margin-bottom:0.25rem; }
        .lesson-info p { color:#888; font-size:0.875rem; }
        .check-container { display:flex; align-items:center; gap:0.5rem; cursor:pointer; }
        .check-box-custom { width:24px; height:24px; border:2px solid #555; border-radius:6px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; color:transparent; }
        .check-container input:checked ~ .check-box-custom { background:#10b981; border-color:#10b981; color:white; }
        .check-label { font-size:0.75rem; color:#666; font-weight:600; text-transform:uppercase; }
        .check-container input:checked ~ .check-label { color:#10b981; }
        .collapse-body { max-height:0; overflow:hidden; transition:max-height 0.3s cubic-bezier(0.4,0,0.2,1); background:rgba(0,0,0,0.2); }
        .collapse-container.active .collapse-body { max-height:2000px; }
        .body-content { padding:1.5rem; }
        .video-wrapper { background:#000; border-radius:8px; overflow:hidden; position:relative; padding-bottom:56.25%; height:0; margin-bottom:1rem; border:1px solid var(--border-color); }
        .video-wrapper iframe { position:absolute; top:0; left:0; width:100%; height:100%; }
        .video-placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#111; color:#555; }
        .video-part-title { color:var(--primary-purple); font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.5rem; }
    </style>
</head>
<body class="flex flex-col min-h-screen" x-data="lessonsApp()">
    <header class="sticky top-0 z-50" style="background:rgba(255,255,255,0.08); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.1);">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-xl font-black text-white">APROVACAO <span style="color:#ff00ff">PSYCHO</span></span>
            <span class="text-sm text-gray-400">Aulas</span>
        </div>
    </header>
    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl sm:text-4xl font-black text-white mb-2">Aulas <span class="gradient-text">Ao Vivo</span></h1>
            <p class="text-gray-400">Marque as aulas concluidas para acompanhar seu progresso.</p>
        </div>
        <div class="space-y-4">
            <template x-for="(lesson, index) in lessons" :key="lesson.id || index">
                <div class="collapse-container" :class="{ 'active': lesson.isOpen }">
                    <div class="collapse-header" @click="lesson.isOpen = !lesson.isOpen">
                        <div class="lesson-info"><h3 x-text="lesson.title"></h3><p x-text="lesson.subtitle"></p></div>
                        <div @click.stop>
                            <label class="check-container">
                                <span class="check-label" x-text="lesson.studied ? 'Estudado' : 'Estudar'"></span>
                                <input type="checkbox" class="hidden" x-model="lesson.studied" @change="saveProgress()">
                                <div class="check-box-custom"><i class="fas fa-check"></i></div>
                            </label>
                        </div>
                    </div>
                    <div class="collapse-body">
                        <div class="body-content">
                            <div class="mb-6" x-show="lesson.topics && lesson.topics.length > 0">
                                <h4 class="text-xs font-bold text-gray-500 uppercase mb-3 border-b border-gray-800 pb-1">Topicos da Aula</h4>
                                <ul class="space-y-2 text-sm text-gray-300">
                                    <template x-for="topic in lesson.topics">
                                        <li class="flex items-start gap-2">
                                            <template x-if="topic.type === 'break'">
                                                <span class="w-full text-center text-xs italic text-gray-500 py-1 bg-white/5 rounded my-1 border border-white/5"><i class="fas fa-coffee mr-1"></i> Intervalo</span>
                                            </template>
                                            <template x-if="topic.type !== 'break'">
                                                <div class="flex gap-2"><i class="fas fa-check text-cyan-400 mt-1 text-xs"></i><span x-text="topic.text"></span></div>
                                            </template>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                            <div class="mb-6" x-show="lesson.links && lesson.links.length > 0">
                                <h4 class="text-xs font-bold text-gray-500 uppercase mb-3 border-b border-gray-800 pb-1">Links e Materiais</h4>
                                <ul class="space-y-2">
                                    <template x-for="link in lesson.links">
                                        <li><a :href="link.url" target="_blank" rel="noopener" class="flex items-center gap-2 text-sm text-cyan-400 hover:text-cyan-300 hover:underline transition"><i class="fas fa-external-link-alt text-xs opacity-50"></i><span x-text="link.label || link.url"></span></a></li>
                                    </template>
                                </ul>
                            </div>
                            <div class="grid md:grid-cols-2 gap-4" x-show="lesson.videos && lesson.videos.length > 0">
                                <template x-for="(video, vIndex) in lesson.videos">
                                    <div>
                                        <div class="video-part-title" x-text="'Parte ' + (vIndex + 1)"></div>
                                        <div class="video-wrapper">
                                            <template x-if="video.embed"><div x-html="video.embed" class="w-full h-full"></div></template>
                                            <template x-if="!video.embed"><div class="video-placeholder"><i class="fas fa-lock text-4xl mb-2 opacity-30"></i><span class="text-sm font-bold opacity-50">Disponivel em Breve</span></div></template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>
    <script id="aulas-data" type="application/json">
{JSON}
    SCRIPT_END
    <script>
        function lessonsApp() {
            return {
                lessons: [],
                init: function() {
                    var el = document.getElementById('aulas-data');
                    if (!el) { this.lessons = []; return; }
                    try {
                        var data = JSON.parse(el.textContent);
                        var m = window.location.pathname.match(/aulas_(.+)\\.html/);
                        var className = m ? m[1] : 'Base';
                        var saved = JSON.parse(localStorage.getItem(className.toLowerCase() + '_aulas_progress') || '{}');
                        this.lessons = data.map(function(l) {
                            l.studied = saved[l.id] || false;
                            l.isOpen = l.isOpen || false;
                            return l;
                        });
                    } catch(e) { console.error(e); this.lessons = []; }
                },
                saveProgress: function() {
                    var m = window.location.pathname.match(/aulas_(.+)\\.html/);
                    var className = m ? m[1] : 'Base';
                    var map = {};
                    this.lessons.forEach(function(l) { if (l.studied) map[l.id] = true; });
                    localStorage.setItem(className.toLowerCase() + '_aulas_progress', JSON.stringify(map));
                }
            };
        }
    END_SCRIPT
</body>
</html></template>

    <script>
        // Load template content, replacing placeholder markers with actual closing tags
        var tplEl = document.getElementById('tpl-aulas');
        var TEMPLATE_AULAS = tplEl.innerHTML
            .replace(/SCRIPT_END/g, '</script' + '>')
            .replace(/END_SCRIPT/g, '</script' + '>');
        // Remove the template element (clean DOM)
        tplEl.remove();
    </script>
</body>
</html>
